<div class="users-page">

    <!-- HEADER -->
    <div class="page-header">
        <div>
            <h2>Users</h2>
            <p>Manage portal users</p>
        </div>

        @if (role === "ADMIN") {
        <button class="add-btn" (click)="openAddDialog()">
            <mat-icon>add</mat-icon>
            Add User
        </button>
        }
    </div>

    <!-- FILTERS -->
    <div class="filters-card">
        <div class="search-box">
            <mat-icon>search</mat-icon>
            <input type="text" placeholder="Search username/email" [(ngModel)]="searchText" (input)="applyFilters()" />
        </div>

        <div class="simple-select">
            <select [(ngModel)]="roleFilter" (change)="applyFilters()">
                <option value="">
                    All Roles
                </option>
                <option value="1">
                    Admin
                </option>
                <option value="2">
                    Interviewer
                </option>
            </select>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
        <div class="table-wrapper">
            <table mat-table [dataSource]="dataSource">

                <!-- USERNAME -->
                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef>
                        Username
                    </th>
                    <td mat-cell *matCellDef="let user">
                        <div class="user-info">
                            <div class="avatar">
                                {{ user.username?.charAt(0) | uppercase }}
                            </div>
                            <div>
                                <div class="username">
                                    {{ user.username | titlecase }}
                                </div>

                                <div class="email-mobile">
                                    {{ user.email }}
                                </div>
                            </div>
                        </div>
                    </td>
                </ng-container>

                <!-- EMAIL -->
                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>
                        Email
                    </th>
                    <td mat-cell *matCellDef="let user">
                        {{ user.email }}
                    </td>
                </ng-container>

                <!-- ROLE -->

                <ng-container matColumnDef="role">
                    <th mat-header-cell *matHeaderCellDef>
                        Role
                    </th>
                    <td mat-cell *matCellDef="let user">
                        <span class="role-badge">
                            {{ user.roleId === 1 ? "ADMIN" : "INTERVIEWER" }}
                        </span>
                    </td>
                </ng-container>

                <!-- STATUS -->
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>
                        Status
                    </th>
                    <td mat-cell *matCellDef="let user">

                        <span class="status-badge" [class.active]="user.isActive">
                            {{ user.isActive ? 'Active' : 'Inactive' }}
                        </span>
                    </td>
                </ng-container>

                <!-- ACTIONS -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>
                        Actions
                    </th>
                    <td mat-cell *matCellDef="let user">
                        <button class="action-btn" style="margin-right: 5px;" (click)="openEditDialog(user)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button class="action-btn delete" (click)="deleteUser(user)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>

            <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
            </mat-paginator>
        </div>
    </div>

</div>

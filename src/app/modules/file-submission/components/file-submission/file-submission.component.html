<div class="submissions-page">

    <div class="page-header">

        <div>
            <h2>Submissions</h2>
            <p>
                All candidate submissions and AI evaluations
            </p>
        </div>

    </div>

    <div class="filters-card">

        <div class="search-box">

            <mat-icon>
                search
            </mat-icon>

            <input type="text" placeholder="Search submissions" [(ngModel)]="searchText" (input)="applyFilters()" />

        </div>

    </div>

    <div class="table-card">

        <div class="table-wrapper">

            <table mat-table [dataSource]="dataSource">

                <!-- Assessment -->
                <!-- <ng-container matColumnDef="assessmentId">

                    <th mat-header-cell *matHeaderCellDef>
                        Assessment
                    </th>

                    <td mat-cell *matCellDef="let row">
                        {{ row.assessmentName }}
                    </td>

                </ng-container> -->

                <!-- Candidate -->
                <ng-container matColumnDef="candidateFileId">

                    <th mat-header-cell *matHeaderCellDef>
                        Candidate
                    </th>

                    <td mat-cell *matCellDef="let row">
                        {{ row.candidateName }}
                    </td>

                </ng-container>

                <!-- Status -->
                <ng-container matColumnDef="status">

                    <th mat-header-cell *matHeaderCellDef>
                        Status
                    </th>

                    <td mat-cell *matCellDef="let row">

                        <span class="status-badge active">

                            {{ row.output }}

                        </span>

                    </td>

                </ng-container>

                <!-- Score -->
                <ng-container matColumnDef="score">

                    <th mat-header-cell *matHeaderCellDef>
                        AI Score
                    </th>

                    <td mat-cell *matCellDef="let row">

                        <span class="score-badge">

                            {{ row.aiScore }}/10

                        </span>

                    </td>

                </ng-container>

                <!-- Evaluated -->
                <ng-container matColumnDef="evaluatedAt">

                    <th mat-header-cell *matHeaderCellDef>
                        Evaluated
                    </th>

                    <td mat-cell *matCellDef="let row">

                        {{ row.evaluatedAt | date:'medium' }}

                    </td>

                </ng-container>

                <!-- Actions -->
                <ng-container matColumnDef="actions">

                    <th mat-header-cell *matHeaderCellDef>
                        Actions
                    </th>

                    <td mat-cell *matCellDef="let row">

                        <button class="action-btn" (click)="viewSubmission(row)">
                            <mat-icon>
                                visibility
                            </mat-icon>
                        </button>

                    </td>

                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns">
                </tr>

                <tr mat-row *matRowDef="let row; columns: displayedColumns">
                </tr>

            </table>

            <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]" showFirstLastButtons>
            </mat-paginator>

        </div>

    </div>

</div>
